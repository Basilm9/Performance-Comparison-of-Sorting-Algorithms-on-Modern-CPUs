name: Valgrind

on:
  workflow_dispatch:

jobs:
  valgrind:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install valgrind
        run: sudo apt-get install -y valgrind

      - name: Run valgrind (cache + branch miss rates)
        run: python tests/run_valgrind.py --output data/results-${{ matrix.runner }}.csv

      - name: Install matplotlib
        run: pip install matplotlib

      - name: Regenerate charts
        run: python data/Charts.py

      - name: Commit results
        run: |
          git config user.email "andre.mercado44@gmail.com"
          git config user.name "andre"
          git add data/results-${{ matrix.runner }}.csv data/*.png
          git diff --cached --quiet || git commit -m "valgrind results + charts from ${{ matrix.runner }}"
          git pull --rebase && git push

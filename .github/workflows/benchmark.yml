name: Benchmarks

on:
  push:
    branches: [main]

jobs:
  benchmark:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run benchmarks
        run: python tests/test_sorts.py

      - name: Commit results
        run: |
          git config user.email "andre.mercado44@gmail.com"
          git config user.name "andre"
          git add data/results.csv
          git diff --cached --quiet || git commit -m "benchmark results from ${{ matrix.runner }}"
          git push

name: Benchmarks

on:
  workflow_dispatch:

jobs:
  benchmark:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install perf tools
        run: |
          sudo apt-get install -y linux-tools-generic || true
          sudo apt-get install -y linux-tools-$(uname -r) || true
          sudo sh -c 'echo -1 > /proc/sys/kernel/perf_event_paranoid'

      - name: Run benchmarks
        run: |
          rm -f data/results-${{ matrix.runner }}.csv
          python tests/test_sorts.py --output data/results-${{ matrix.runner }}.csv

      - name: Commit results
        run: |
          git config user.email "andre.mercado44@gmail.com"
          git config user.name "andre"
          git add data/results-${{ matrix.runner }}.csv
          git diff --cached --quiet || git commit -m "benchmark results from ${{ matrix.runner }}"
          git pull --rebase && git push
